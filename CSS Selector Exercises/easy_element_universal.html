<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Element and Universal Selectors</title>
    <link rel="stylesheet" href="easy_element_universal.css">
</head>
<body>
    <h1>Element and Universal Selectors</h1>
    <p>This is the 1st paragraph. It's styled using the element selector for this paragraph </p>
    <p>This is the 2nd paragraph. Element selectors apply to all elements of that type on the page</p>
    
    <h2>My List</h2>
    <ul>
        <li>Driving</li>
        <li>Cooking</li>
        <li>Playing Video Game</li>
    </ul>

    <button>Click Me</button>
</body>
