<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Box model Example</title>
        <style>
            .box {
                box-sizing: content-box;
                width: 100px;
                height: 200px;
                background-color: rgb(201, 8, 8);
                padding: 100px;
                border: 5px solid rgb(1, 1, 8);
                margin: auto;
                border-radius: 200px;
            }
        </style>
    </head>
    <body>
        <div class="box">
            <h1>Some heading</h1>
        </div>
    </body>
</html>
