<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Content Box</title>
        <style>
            .content-box {
                margin: 0 auto;
                width: 800%;
                max-width: 600px;
                background-color: lightgrey;
                padding: 20px;
                border: 2px solid darkgray;
                border-radius: 10px;
            }

            h2 {
                text-align: center;
            }

            .note {
                text-align: justify;
            }
        </style>
    </head>
    <body>
        <div class="content-box">
            <h2>Centered Content Box</h2>

            <p class="note">Hello my friend. I'm Shakthy a from Forward College. Also, I'm a software engineer. Also, my specialists are Data Science and Deep Machine learning</p>
        </div>
    </body>
</html>
